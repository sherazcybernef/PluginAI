services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: pluginai
      POSTGRES_PASSWORD: pluginai
      POSTGRES_DB: pluginai
    ports:
      - "5432:5432"
    volumes:
      - pluginai_pg:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  pluginai_pg:
